<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installment Projections</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #EAECF0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: #111;
  }

  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.07), 0 8px 32px rgba(0,0,0,.09);
    width: 100%;
    max-width: 620px;
    overflow: hidden;
  }

  .card-body { padding: 2rem 2rem 1.75rem; }

  .card-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: #111;
    margin-bottom: .35rem;
    letter-spacing: -.01em;
  }

  .card-sub {
    font-size: .875rem;
    color: #6B7280;
    line-height: 1.6;
    margin-bottom: 1.6rem;
  }

  .section-label {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9CA3AF;
    margin-bottom: .5rem;
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed #C4C9D8;
    border-radius: 12px;
    background: #F8F9FC;
    padding: 2.25rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: #7B8DB0;
    background: #F0F3FA;
  }
  .dropzone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .dropzone-icon {
    width: 36px; height: 36px; margin: 0 auto .75rem;
    color: #9CA3AF;
  }
  .dropzone-text {
    font-size: .9rem; color: #374151;
    margin-bottom: .3rem;
  }
  .dropzone-text strong { font-weight: 600; }
  .dropzone-text a { color: #4B6FBE; text-decoration: none; }
  .dropzone-text a:hover { text-decoration: underline; }
  .dropzone-hint { font-size: .78rem; color: #9CA3AF; }

  /* File list */
  .file-list { margin-top: .75rem; display: flex; flex-direction: column; gap: .4rem; }
  .file-pill {
    display: flex; align-items: center; gap: .5rem;
    background: #F3F4F6; border-radius: 7px;
    padding: .4rem .75rem; font-size: .82rem; color: #374151;
  }
  .file-pill svg { flex-shrink: 0; color: #6B7280; }
  .file-pill .remove {
    margin-left: auto; cursor: pointer; color: #9CA3AF;
    background: none; border: none; font-size: 1rem; line-height: 1;
    padding: 0 2px;
  }
  .file-pill .remove:hover { color: #374151; }

  /* Actions */
  .actions {
    display: flex; gap: .75rem; margin-top: 1.5rem;
  }

  .btn-process {
    flex: 1;
    background: #4B5563;
    color: white;
    border: none;
    border-radius: 8px;
    padding: .7rem 1.25rem;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: .9rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    transition: background .15s;
  }
  .btn-process:hover:not(:disabled) { background: #1F2937; }
  .btn-process:disabled { opacity: .55; cursor: not-allowed; }

  .btn-clear {
    background: white;
    color: #374151;
    border: 1px solid #D1D5DB;
    border-radius: 8px;
    padding: .7rem 1.25rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: .9rem;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .btn-clear:hover { background: #F9FAFB; border-color: #9CA3AF; }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results section */
  .results { border-top: 1px solid #F3F4F6; }

  .result-item {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid #F3F4F6;
  }
  .result-item:last-child { border-bottom: none; }

  .result-name {
    font-size: .95rem; font-weight: 600; color: #111;
    margin-bottom: .15rem;
    display: flex; align-items: center; gap: .4rem;
  }
  .result-meta { font-size: .78rem; color: #9CA3AF; margin-bottom: .9rem; }

  .stats-row {
    display: flex; gap: .5rem; margin-bottom: 1rem;
  }
  .stat-card {
    flex: 1; background: #F9FAFB; border: 1px solid #E5E7EB;
    border-radius: 8px; padding: .6rem .4rem; text-align: center;
  }
  .stat-num { font-size: 1.15rem; font-weight: 700; color: #111; line-height: 1; }
  .stat-lbl { font-size: .6rem; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; margin-top: .2rem; }

  .btn-download {
    display: block; width: 100%;
    background: #374151; color: white;
    border: none; border-radius: 8px;
    padding: .65rem 1.25rem;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: .875rem;
    cursor: pointer; text-align: center;
    transition: background .15s;
    text-decoration: none;
  }
  .btn-download:hover { background: #1F2937; }

  /* Error */
  .error-item {
    padding: 1rem 2rem;
    background: #FEF2F2;
    border-top: 1px solid #FECACA;
  }
  .error-item p { font-size: .85rem; color: #B91C1C; }
  .error-item strong { font-weight: 600; }
</style>
</head>
<body>

<div class="card">
  <div class="card-body">
    <div class="card-title">Installment Projections</div>
    <div class="card-sub">Upload the QBO ticket credit general ledger (one company or consolidated) for any time period in the prior month to project the same period in the coming month.</div>

    <div class="section-label">GL Files</div>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple accept=".xlsx">
      <svg class="dropzone-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <div class="dropzone-text">Drag &amp; drop your <strong>Excel</strong> files here, or <a href="#" onclick="document.getElementById('fileInput').click(); return false;">browse</a></div>
      <div class="dropzone-hint">Accepts multiple .xlsx GL files</div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="actions">
      <button class="btn-process" id="processBtn" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
        </svg>
        <span id="btnLabel">Process &amp; Export</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button class="btn-clear" id="clearBtn">Clear</button>
    </div>
  </div>

  <div class="results" id="results" style="display:none;"></div>
</div>

<script>
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const fileList   = document.getElementById('fileList');
  const processBtn = document.getElementById('processBtn');
  const clearBtn   = document.getElementById('clearBtn');
  const spinner    = document.getElementById('spinner');
  const btnLabel   = document.getElementById('btnLabel');
  const resultsDiv = document.getElementById('results');

  let selectedFiles = [];

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(files) {
    files.filter(f => f.name.endsWith('.xlsx')).forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f);
    });
    renderFileList();
  }

  function renderFileList() {
    fileList.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const pill = document.createElement('div');
      pill.className = 'file-pill';
      pill.innerHTML = `
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <span>${f.name}</span>
        <button class="remove" data-i="${i}" title="Remove">×</button>`;
      fileList.appendChild(pill);
    });
    fileList.querySelectorAll('.remove').forEach(btn => btn.addEventListener('click', () => {
      selectedFiles.splice(+btn.dataset.i, 1); renderFileList();
    }));
    processBtn.disabled = selectedFiles.length === 0;
  }

  clearBtn.addEventListener('click', () => {
    selectedFiles = []; renderFileList();
    resultsDiv.style.display = 'none'; resultsDiv.innerHTML = '';
  });

  processBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;

    // UI: loading state
    processBtn.disabled = true;
    btnLabel.textContent = 'Processing…';
    spinner.style.display = 'block';
    resultsDiv.style.display = 'none'; resultsDiv.innerHTML = '';

    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('files', f));

    try {
      const resp = await fetch('/process', { method: 'POST', body: formData });
      const data = await resp.json();

      if (data.error) {
        resultsDiv.innerHTML = `<div class="error-item"><p><strong>Error:</strong> ${data.error}</p></div>`;
      } else {
        data.results.forEach(r => {
          if (r.error) {
            resultsDiv.innerHTML += `
              <div class="error-item">
                <p><strong>${r.filename}:</strong> ${r.error}</p>
              </div>`;
          } else {
            const s = r.stats;
            const coStr = s.companies > 1 ? `${s.companies} companies · ` : '';
            const total = s.total.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
            resultsDiv.innerHTML += `
              <div class="result-item">
                <div class="result-name">
                  <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25"/>
                  </svg>
                  ${r.filename}
                </div>
                <div class="result-meta">${s.date_range} · ${coStr}${s.transactions.toLocaleString()} transactions</div>
                <div class="stats-row">
                  <div class="stat-card"><div class="stat-num">${s.transactions.toLocaleString()}</div><div class="stat-lbl">Transactions</div></div>
                  <div class="stat-card"><div class="stat-num">${s.accounts}</div><div class="stat-lbl">Accounts</div></div>
                  <div class="stat-card"><div class="stat-num">${s.teams}</div><div class="stat-lbl">Teams</div></div>
                  <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Spent</div></div>
                </div>
                <a class="btn-download" href="#" data-hex="${r.data}" data-filename="${r.filename}">Download Report</a>
              </div>`;
          }
        });

        // Wire up download links
        resultsDiv.querySelectorAll('.btn-download').forEach(btn => {
          btn.addEventListener('click', e => {
            e.preventDefault();
            const hex  = btn.dataset.hex;
            const name = btn.dataset.filename;
            const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
            const blob  = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url   = URL.createObjectURL(blob);
            const a     = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
          });
        });
      }

      resultsDiv.style.display = 'block';
    } catch (err) {
      resultsDiv.innerHTML = `<div class="error-item"><p><strong>Network error:</strong> ${err.message}</p></div>`;
      resultsDiv.style.display = 'block';
    } finally {
      processBtn.disabled = false;
      btnLabel.textContent = 'Process & Export';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
